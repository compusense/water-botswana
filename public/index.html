<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botswana Water Utility - Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-900 to-blue-700 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full">
        <div class="text-center mb-8">
            <div class="text-6xl mb-4">💧</div>
            <h1 class="text-3xl font-bold text-gray-800">Water Utility Botswana</h1>
            <p class="text-gray-600 mt-2">Admin Dashboard Login</p>
        </div>
        
        <form id="login-form">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Email</label>
                <input type="email" id="email" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="admin@waterbotswana.co.bw">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                <input type="password" id="password" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition">
                Login to Dashboard
            </button>
        </form>
        
        <div class="mt-6 text-center text-sm text-gray-600">
            <p>Demo credentials:</p>
            <p class="font-mono text-xs">admin@waterbotswana.co.bw / admin123</p>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Simple demo auth
            if (email === 'admin@waterbotswana.co.bw' && password === 'admin123') {
                window.location.href = '/dashboard';
            } else {
                alert('Invalid credentials. Use admin@waterbotswana.co.bw / admin123');
            }
        });
    </script>
</body>
</html>
